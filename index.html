<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Tech Solutions - Sri Lankan ICT, Cybersecurity & Professional Software Partner</title>
    <script>
      // Diagnostic Guard: Define a getter and setter for fetch on window to prevent TypeErrors when libraries or sandboxes try to write to window.fetch / globalThis.fetch
      try {
        if (typeof window !== 'undefined') {
          let activeFetch = typeof window.fetch === 'function' ? window.fetch : null;
          
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return activeFetch;
            },
            set: function(newFetch) {
              activeFetch = newFetch;
            },
            configurable: true,
            enumerable: true
          });

          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            Object.defineProperty(globalThis, 'fetch', {
              get: function() {
                return activeFetch;
              },
              set: function(newFetch) {
                activeFetch = newFetch;
              },
              configurable: true,
              enumerable: true
            });
          }
        }
      } catch (e) {
        console.warn("[Diagnostic] Safe getter/setter patch for fetch skipped:", e);
      }

      // Pre-render Theme Initialization Guard to prevent paint flickering
      try {
        const storedTheme = localStorage.getItem('etech_theme');
        if (storedTheme === 'slate-blue') {
          document.documentElement.setAttribute('data-theme', 'slate-blue');
          document.documentElement.classList.add('theme-slate-blue');
        } else {
          document.documentElement.setAttribute('data-theme', 'midnight');
          document.documentElement.classList.remove('theme-slate-blue');
        }
      } catch (e) {
        console.warn("[Theme] Pre-render static theme initialization skipped:", e);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
